manifestVersion: 1
id: wvk2017-miningcore-webui
name: MiningCore Web UI
tagline: Web UI for the MiningCore Mining Pool App
icon: https://raw.githubusercontent.com/TheRetroMike/retromike-umbrel-app-store/master/retro-mike-miningcore-webui/webui.png
category: SOLO Crypto Mining
version: "2.9.0"
port: 8559
description: |
  Web UI for the MiningCore Mining Pool App. For a full functioning app, you will also need to install the MiningCore App.
  
  If you find this app useful, please consider donating

  https://throne.com/retromike

developer: wvk2017
website: http://wvk2017.nl
submitter: wvk2017
submission: https://hub.docker.com/r/wvk2017/miningcorewebui
repo: https://hub.docker.com/r/wvk2017/miningcorewebui
support: https://hub.docker.com/r/wvk2017/miningcorewebui
gallery:
  - https://raw.githubusercontent.com/TheRetroMike/retromike-umbrel-app-store/master/retro-mike-miningcore-webui/webui.png
releaseNotes: |
  2026.03.31 - Added fractal-bitcoin 
  2026.03.28 - Added Nitocoin    
  2026.03.14 - Added Litecoin Cash
  2026.03.10 - Added Wojakcoin
  2026.02.25 - Added NerdMiner and High Hashrate Support for Sha256
  2026.01.26 - Added Peercoin. Removed eCash.
  2026.01.16 - Added Vertcoin
  2026.01.14 - Fixed XEC Wallet Format
  2026.01.12 - Added Widgets that show configured pools with blocks, hashrate, and node synced status    
  2026.01.11 - Added BitcoinII
  2026.01.10 - Added Pool Configuration Screen allowing for no-code configuration    
  2025.11.02 - Initial Release
widgets:
  - id: "page1"
    type: "list"
    refresh: "5s"
    endpoint: "web:8080/api/PoolStatsWidget/0"
    link: ""
    example:
      type: "list"
      link: ""
      items:
        - text: "Bitcoin | 1.2 TH/s | 1 Blocks"
          subtext: "Last Synced Block: 01/12/2026 10:12:34"
        - text: "Bitcoin Cash | 1.2 TH/s | 1 Blocks"
          subtext: "Last Synced Block: 01/12/2026 10:12:34"
        - text: "BitcoinSV | 0 H/s | 0 Blocks"
          subtext: "Last Synced Block: INITIAL BLOCK SYNC"
  - id: "page2"
    type: "list"
    refresh: "5s"
    endpoint: "web:8080/api/PoolStatsWidget/1"
    link: ""
    example:
      type: "list"
      link: ""
      items:
        - text: "Bitcoin | 1.2 TH/s | 1 Blocks"
          subtext: "Last Synced Block: 01/12/2026 10:12:34"
        - text: "Bitcoin Cash | 1.2 TH/s | 1 Blocks"
          subtext: "Last Synced Block: 01/12/2026 10:12:34"
        - text: "BitcoinSV | 0 H/s | 0 Blocks"
          subtext: "Last Synced Block: INITIAL BLOCK SYNC"
  - id: "page3"
    type: "list"
    refresh: "5s"
    endpoint: "web:8080/api/PoolStatsWidget/2"
    link: ""
    example:
      type: "list"
      link: ""
      items:
        - text: "Bitcoin | 1.2 TH/s | 1 Blocks"
          subtext: "Last Synced Block: 01/12/2026 10:12:34"
        - text: "Bitcoin Cash | 1.2 TH/s | 1 Blocks"
          subtext: "Last Synced Block: 01/12/2026 10:12:34"
        - text: "BitcoinSV | 0 H/s | 0 Blocks"
          subtext: "Last Synced Block: INITIAL BLOCK SYNC"
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
