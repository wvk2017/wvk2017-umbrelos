version: "3.8"

services:

  app_proxy:
    environment:
      APP_HOST: wvk2017-fb-node_web_1
      APP_PORT: 3000
  web:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: on-failure
    depends_on:
      - node
  node:
    image: wvk2017/nodes:fractal-bitcoin
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/.fractal-bitcoin:/root/.bitcoind
    ports:
      - 10332:10332    # RPC
      - 8333:8333    # ZMQ
    entrypoint: "bitcoind -printtoconsole -server -prune=550 -wallet=default -zmqpubhashblock=tcp://127.0.0.1:8333 -rpcbind=0.0.0.0 -rpcport=10332 -rpcallowip=0.0.0.0/0 -rpcuser=pooluser -rpcpassword=poolpassword"
