version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: retro-mike-nito-node_web_1
      APP_PORT: 8080
  web:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: on-failure
    depends_on:
      - node
  node:
    image: theretromike/nodes:nito
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/.nito:/root/.nito
    ports:
      - 9020:9020    # RPC
      - 7020:7020    # ZMQ
    entrypoint: "nitod -printtoconsole -server -prune=550 -wallet=default -zmqpubhashblock=tcp://127.0.0.1:7020 -rpcbind=0.0.0.0 -rpcport=9020 -rpcallowip=0.0.0.0/0 -rpcuser=pooluser -rpcpassword=poolpassword"
